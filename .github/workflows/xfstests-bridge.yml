#
# xfstests-bridge: syntax-check every cthon26 xfstests wrapper plus
# the install.sh helper and the shared common/cthon26 file.  Run on
# any change under xfstests-bridge/ or to this workflow.
#
# This CI does NOT run the wrappers end-to-end -- that needs a real
# xfstests checkout, a real NFS mount, and a built cthon26 tree.
# End-to-end validation is a tester-side responsibility (the bridge
# README documents the workflow).

name: xfstests-bridge

on:
  push:
    branches: [main]
    paths:
      - 'xfstests-bridge/**'
      - '.github/workflows/xfstests-bridge.yml'
  pull_request:
    paths:
      - 'xfstests-bridge/**'
      - '.github/workflows/xfstests-bridge.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax check common/cthon26
        run: bash -n xfstests-bridge/common/cthon26

      - name: Shell syntax check install.sh (bash + sh)
        run: |
          bash -n xfstests-bridge/install.sh
          sh -n xfstests-bridge/install.sh

      - name: Shell syntax check every wrapper
        run: |
          set -e
          ok=0
          for f in xfstests-bridge/tests/nfs/9??; do
            bash -n "$f"
            ok=$((ok + 1))
          done
          echo "wrappers checked: $ok"

      - name: Verify every wrapper has a matching .out file
        run: |
          set -e
          miss=0
          for f in xfstests-bridge/tests/nfs/9??; do
            [ -f "$f.out" ] || { echo "missing: $f.out"; miss=$((miss + 1)); }
          done
          if [ $miss -ne 0 ]; then
            echo "::error::$miss wrappers missing .out files"
            exit 1
          fi

      - name: Verify .out files all say "Silence is golden."
        run: |
          set -e
          wrong=0
          for f in xfstests-bridge/tests/nfs/*.out; do
            num=$(basename "$f" .out)
            expected="QA output created by $num
Silence is golden."
            if [ "$(cat "$f")" != "$expected" ]; then
              echo "::error::unexpected content in $f"
              wrong=$((wrong + 1))
            fi
          done
          [ $wrong -eq 0 ]

      - name: install.sh --dry-run against a fake xfstests tree
        run: |
          mkdir -p /tmp/fake-xfstests/tests/nfs /tmp/fake-xfstests/common
          ./xfstests-bridge/install.sh --dry-run /tmp/fake-xfstests \
            | tee install-dry.txt
          grep -q "would copy: .*common/cthon26" install-dry.txt
          grep -q "would copy: .*tests/nfs/900" install-dry.txt

      - name: install.sh actual copy against a fake xfstests tree
        run: |
          ./xfstests-bridge/install.sh /tmp/fake-xfstests
          test -f /tmp/fake-xfstests/common/cthon26
          test -x /tmp/fake-xfstests/tests/nfs/900
          test -f /tmp/fake-xfstests/tests/nfs/900.out
